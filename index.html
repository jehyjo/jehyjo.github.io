<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Jeon HyungJoon personal website">
  <meta name="robots" content="noindex, nofollow">
  <title>Jeon HyungJoon</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <a class="skip-link" href="#home">Skip to content</a>

  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="#home" aria-label="Go to home">
        <span class="brand-text">
          <span class="brand-name" data-brand-name>Jeon HyungJoon</span>
        </span>
      </a>

      <nav class="primary-nav" aria-label="Primary navigation" id="primaryNav">
        <a href="#home">Home</a>
        <a href="#research">Research</a>
        <a href="#projects">Projects</a>
        <a href="#experience">Experience</a>
        <a href="#extracurricular">Extracurricular & Leadership</a>
        <a href="#awards">Awards</a>
        <a href="#certificates">Certificates</a>
        <a href="#skills">Skills</a>
        <a href="#cv">CV</a>
      </nav>

      <div class="header-actions">
        <div class="language-switcher" id="languageSwitcher" hidden aria-label="Language">
          <button type="button" data-language="ko">KO</button>
          <button type="button" data-language="en">EN</button>
        </div>
      </div>
    </div>
  </header>

  <main id="main">
    <section class="section section-hero" id="home" data-section="home">
      <div class="section-body" data-section-body>
        <div class="fallback-panel">
          <p>This site is loading. If it does not load, contact jeon_hj@yonsei.ac.kr or download the CV.</p>
          <a href="assets/docs/CV.pdf">Download CV</a>
        </div>
      </div>
    </section>

    <section class="section" id="research" data-section="research">
      <div class="section-body" data-section-body></div>
    </section>

    <section class="section" id="projects" data-section="projects">
      <div class="section-body" data-section-body></div>
    </section>

    <section class="section" id="experience" data-section="experience">
      <div class="section-body" data-section-body></div>
    </section>

    <section class="section" id="extracurricular" data-section="extracurricular">
      <div class="section-body" data-section-body></div>
    </section>

    <section class="section" id="awards" data-section="awards">
      <div class="section-body" data-section-body></div>
    </section>

    <section class="section" id="certificates" data-section="certificates">
      <div class="section-body" data-section-body></div>
    </section>

    <section class="section" id="skills" data-section="skills">
      <div class="section-body" data-section-body></div>
    </section>

    <section class="section section-cv" id="cv" data-section="cv">
      <div class="section-body" data-section-body></div>
    </section>
  </main>

  <div class="detail-overlay" id="detailOverlay" hidden>
    <button class="detail-backdrop" type="button" data-detail-close aria-label="Close details"></button>
    <article class="detail-panel" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
      <button class="detail-close" type="button" data-detail-close aria-label="Close details">Close</button>
      <div id="detailContent"></div>
    </article>
  </div>

  <footer class="site-footer">
    <p data-footer-text>© 2026 Jeon HyungJoon</p>
  </footer>

  <script src="assets/js/site.config.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
